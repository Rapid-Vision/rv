worker:
  worker_name: render-1
  task_name: dataset_render

  renderer:
    max_procs: 5

  rtasks:
    url: http://localhost:5701
    token: secret_token
    poll_interval: 2s

  directories:
    working: ./tmp/
    output: ./out/
    cleanup_policy: keep

  s3:
    endpoint: localhost:9000
    path: /rv-results/
    region: eu-central-1
    secure: false
    cleanup: false
    access_key: minioadmin
    secret_key: minioadmin
